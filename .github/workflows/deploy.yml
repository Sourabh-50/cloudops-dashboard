name: CI/CD Docker Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # Enable manual execution and API dispatching

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build and Push Docker image
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cloudops-dashboard:latest
            ${{ secrets.DOCKER_USERNAME }}/cloudops-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to AWS EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Redeploy Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Pull down the latest container image from Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKER_USERNAME }}/cloudops-dashboard:latest
            
            # Safely stop and recycle the running container
            docker stop cloudops-dashboard || true
            docker rm cloudops-dashboard || true
            
            # Spin up the container on port 5000, injecting environment configurations
            docker run -d \
              -p 5000:5000 \
              --name cloudops-dashboard \
              --restart unless-stopped \
              -e ENVIRONMENT="Production" \
              -e CLOUD_PROVIDER="AWS EC2 (t2.micro)" \
              -e APP_VERSION="1.0.0" \
              -e BUILD_NUMBER="${{ github.run_number }}" \
              -e GITHUB_PAT="${{ secrets.GITHUB_PAT }}" \
              -e GITHUB_REPO="${{ github.repository }}" \
              ${{ secrets.DOCKER_USERNAME }}/cloudops-dashboard:latest

